version: "1.0"
report_type: "监管政策周报"

role_positioning:
  primary_role: "平安集团合规专家"
  audience: "平安集团高管"
  working_view: "站在平安集团合规管理和经营协同视角"
  writing_principles:
    - "不做泛行业评论"
    - "不做学术型分析"
    - "不写空话"
    - "直接回答哪个政策、谁受影响、要做什么"

output_goals:
  - "帮助高管快速判断本周哪些政策值得关注"
  - "帮助高管快速判断对平安哪些主体或业务场景有影响"
  - "帮助高管快速判断最关键动作是什么"

entity_scope_rules:
  preferred_entities:
    # 集团总部 / 团队
    - "集团合规部"
    - "集团消保团队"
    - "集团反洗钱团队"
    - "集团科技条线"
    - "集团财务部"
    # 持牌主体
    - "平安银行"
    - "平安银行零售业务"
    - "平安银行普惠业务"
    - "平安银行对公业务"
    - "平安寿险"
    - "平安养老险"
    - "平安健康险"
    - "平安产险"
    - "平安理财"
    - "平安资管"
    - "平安基金"
    - "平安信托"
    - "平安资本"
    - "平安证券"
    - "平安证券投行业务"
    - "平安证券交易与经纪"
    - "平安期货"
    - "平安租赁"
    - "平安医疗健康板块"
    # 产品线 / 业务线（落差 2 新增）
    - "壹钱包"
    - "陆控"
    - "陆控担保业务（融易）"
    - "陆控消金业务"
    - "平安消金"
    - "平安健康（互联网医疗）"
    - "平安期货风险管理子公司"
    # 部门级
    - "平安产险农险部"
  usage_rules:
    - "只点真正受影响的主体，不机械铺开全部公司"
    - "优先使用业务场景化主体名称，不只写牌照主体名称"
    - "若政策仅影响单一业务条线，只写该条线"
    - "若政策属于集团穿透治理类，可写集团科技条线、集团合规部、集团消保团队等集团主体"
  preferred_scene_expressions:
    - "健康服务合作、保险支付衔接和慢病管理"
    - "终端展示、订单校验、风控阈值和客户提示"
    - "线上服务、数字员工、导诊陪伴场景"
    - "跨境贷款额度管理和间接授信边界"
    - "数据采集、标签画像、模型调用和外部共享链路"

importance_rules:
  major_conditions:
    - "直接影响核心牌照或重点业务"
    - "直接带来制度整改、系统改造、产品回溯、模型治理、交易规则调整、行政许可要求"
    - "直接影响集团战略方向，如综合金融、医疗养老、科技应用、数据治理、风控穿透"
    - "直接影响业务准入、创新资格、评级结果、处罚风险"
    - "虽未正式生效，但已明显改变业务边界、治理责任或监管口径"
  minor_conditions:
    - "benchmark_only 对标型文件"
    - "宏观或顶层方向性文件，暂无平安直接落点"
    - "机会项或观察项，但不构成明确整改动作"
    - "弱相关、信息性文件"
  decision_hints:
    - "A1_direct_obligation 通常判为 major"
    - "A2_scene_direct_related 通常判为 major"
    - "B1_group_penetrating 通常判为 major"
    - "B2_benchmark_only 通常判为 minor"
    - "C_watch_or_opportunity 结合主体和动作强度决定，可 major 也可 minor"

paragraph_count_rules:
  default_major_paragraphs: 2
  default_minor_paragraphs: 1
  benchmark_default_paragraphs: 1
  opportunity_default_paragraphs: 1
  rules:
    - "重点文件最多两段"
    - "非重点文件只写一段"
    - "benchmark_only 默认只写一段"
    - "opportunity 默认只写一段，只有确有必要时才允许第二段机会句"
    - "任何条目不得超过两段"

paragraph_structure_rules:
  paragraph1:
    role: "政策摘要段"
    must_include:
      - "发布日期"
      - "发文机构"
      - "文件名"
      - "文件性质或定位"
      - "2-4 个核心制度变化"
      - "生效时间 / 截止时间 / 当前状态 之一"
    hard_constraints:
      - "只能改写事实卡中的政策事实"
      - "不得出现平安主体"
      - "不得出现动作建议"
      - "不得出现对标口径"
      - "不得写宏观意义"
  paragraph2:
    role: "平安影响段"
    must_include:
      - "真正受影响的平安主体（数量按 paragraph2_mode 分级）"
      - "对应主体的关键动作或现状判断（数量按 paragraph2_mode 分级）"
    optional_include:
      - "一个最短的业务落点短语"
      - "集团已开展工作的编辑注记（如【集团X团队已做专项解读】，规则见 editor_notes_rules）"
    hard_constraints:
      - "句数 / 主体数 / 动作数按 paragraph2_mode_rules.mode_definitions.<mode>.entity_count_range / action_count_range / sentence_count_range 控制，禁止越界"
      - "多主体并列时必须以分号或独立小句切分，每个主体落点清晰，不得糊在一句内"
      - "不得复述 paragraph1"
      - "不得引入事实卡之外的新主体、新动作、新制度变化"
      - "benchmark 模式下主语固定为'平安集团'，主体数固定为 1"

paragraph2_mode_rules:
  allowed_modes:
    - "direct"
    - "scene_direct_related"
    - "benchmark"
    - "opportunity"
    - "none"
  mode_definitions:
    direct:
      meaning: "直接影响核心主体或核心业务"
      preferred_pattern: "对平安XXX有直接影响。应XXX。"
      entity_count_range: [1, 5]
      action_count_range: [1, 5]
      sentence_count_range: [1, 6]
      writing_styles:
        - "single_entity_single_action: 单主体单动作（默认，一句受影响 + 一句动作）"
        - "multi_entity_multi_action: 多主体并列、每主体一个动作（如平安银行需…；壹钱包需…；平安产险需…，多主体之间用分号切分）"
        - "with_status_assessment: 影响 + 现状判断（如'现行管理较为完善，预计受新规影响较小'）"
        - "with_group_progress: 影响 + 集团已开展工作（结尾接编辑注记）"
        - "with_quantified_impact: 影响 + 受影响程度量化（如'将影响 X 业务的 23.9%'）"
    scene_direct_related:
      meaning: "影响具体业务场景，但不一定是纯牌照规则"
      preferred_pattern: "对平安XXX有直接影响，后续将改变XXX场景。应XXX。"
      entity_count_range: [1, 3]
      action_count_range: [1, 2]
      sentence_count_range: [2, 4]
      writing_styles:
        - "scene_single: 单主体单场景（默认）"
        - "scene_multi: 多主体共享同一业务场景（如'集团科技条线、平安银行线上服务和保险数字员工场景'）"
    benchmark:
      meaning: "不直接适用于平安，但需要对标"
      preferred_pattern: "平安集团不直接适用该文件，但应对标其核心要求，优先补齐XXX。"
      entity_count_range: [1, 1]
      action_count_range: [0, 1]
      sentence_count_range: [1, 5]
      writing_styles:
        - "benchmark_short: 一句对标（默认，1 句 / ≤ 50 字）"
        - "benchmark_long: 长篇对标分析（仅 importance=major 且涉及战略导向时使用，2-5 句 / 80-300 字。例如央企内控通知类）"
    opportunity:
      meaning: "存在业务机会或观察价值"
      preferred_pattern: "平安XXX可关注XXX机会。"
      entity_count_range: [1, 2]
      action_count_range: [0, 1]
      sentence_count_range: [1, 2]
      writing_styles:
        - "opportunity_watch: 标准机会观察（默认）"
        - "opportunity_indicative: 政策指引型（语气更弱，用'可关注…导向''可参照…要求''具有指引意义'）"
    none:
      meaning: "不输出第二段"
      preferred_pattern: ""
      entity_count_range: [0, 0]
      action_count_range: [0, 0]
      sentence_count_range: [0, 0]
      writing_styles:
        - "none: 仅一段输出"
  mode_usage_rules:
    - "direct 适用于直接义务型政策"
    - "scene_direct_related 适用于场景变化型政策"
    - "benchmark 适用于 benchmark_only 文件"
    - "opportunity 只用于明确的机会项"
    - "none 适用于单段输出"

status_action_rules:
  status_levels:
    正式实施:
      action_strength: "strong"
      allowed_action_styles:
        - "应立即"
        - "应尽快"
        - "应启动"
        - "应开展"
        - "应修订"
      forbidden_action_styles: []
      guidance: "可写整改、修订、排查、调整、切换、补齐等动作"
    征求意见稿:
      action_strength: "medium"
      allowed_action_styles:
        - "应优先评估"
        - "应开展差距分析"
        - "应准备反馈意见"
        - "应预研系统和流程改造"
        - "应梳理业务边界"
      forbidden_action_styles:
        - "应立即整改"
        - "应立即执行"
        - "应立即开展专项排查"
      guidance: "只写评估、映射、预研、准备，不写强整改"
    修订草案:
      action_strength: "medium"
      allowed_action_styles:
        - "应评估"
        - "应梳理"
        - "应准备"
      forbidden_action_styles:
        - "应立即整改"
      guidance: "与征求意见稿同类，动作保持克制"
    计划:
      action_strength: "soft"
      allowed_action_styles:
        - "应跟踪"
        - "可关注"
        - "应预判"
      forbidden_action_styles:
        - "应立即整改"
        - "应立即执行"
      guidance: "以跟踪、预判、观察为主"
    专项行动:
      action_strength: "strong"
      allowed_action_styles:
        - "应开展专项排查"
        - "应补齐"
        - "应统一口径"
      forbidden_action_styles: []
      guidance: "可写专项排查和集团牵头动作"
    对标适用:
      action_strength: "soft"
      allowed_action_styles:
        - "应对标"
        - "应优先补齐"
      forbidden_action_styles:
        - "应立即整改"
        - "应专项排查"
      guidance: "只写对标口径，不写强整改"
    标题级分析:
      action_strength: "soft"
      allowed_action_styles:
        - "可跟踪"
        - "可关注"
      forbidden_action_styles:
        - "应立即整改"
        - "应开展专项排查"
      guidance: "信息不充分时只保留克制表达"

benchmark_rules:
  default_paragraph2_mode: "benchmark"
  default_output_paragraphs: 1
  rules:
    - "benchmark_only 默认只写一段（paragraph2 即为 benchmark 句）"
    - "默认使用 benchmark_short（1 句 / ≤ 50 字）"
    - "仅当 importance=major 且涉及战略导向时，允许 benchmark_long（2-5 句 / 80-300 字）"
    - "不得写成强整改动作"
    - "不得写成集团全面专项排查"
  preferred_sentence: "平安集团不直接适用该文件，但应对标其核心要求，优先补齐XXX。"

opportunity_rules:
  default_paragraph2_mode: "opportunity"
  default_output_paragraphs: 1
  rules:
    - "opportunity 只写机会或观察"
    - "不得写整改动作"
    - "不得夸张拔高"
    - "不得用机会项替代风险判断"
    - "没有明确机会时，paragraph2 直接为空"
  preferred_sentence: "平安XXX可关注XXX机会。"

grouped_policy_rules:
  rules:
    - "同一 grouping_key 只允许输出 1 条主卡片"
    - "主文件优先使用办法/规则/意见类标题"
    - "配套实施公告并入主文件第一段"
    - "同组 paragraph2 只保留一套主体和一个主动作"
    - "不得出现两条几乎重复的 grouped pair 条目"

validation_hard_rules:
  paragraph1_must_be_policy_summary: true
  paragraph2_must_be_pingan_impact: true
  no_new_facts_outside_fact_sheet: true
  no_new_entities_outside_allowed_entities: true
  no_new_actions_outside_allowed_actions: true
  benchmark_default_no_second_paragraph: true
  opportunity_no_remediation: true
  grouped_pair_must_merge: true
  paragraph1_paragraph2_no_high_similarity: true
  forbidden_expansion_must_block: true

focus_phrase_rules:
  usage:
    - "第二段可补一个最短业务落点短语"
    - "落点短语优先来自 impact_focus"
    - "落点短语只起到增强业务终稿感的作用，不得扩成新的分析段"
  preferred_examples:
    - "健康服务合作、保险支付衔接和慢病管理"
    - "终端展示、订单校验、风控阈值和客户提示"
    - "线上服务、数字员工、导诊陪伴场景"
    - "跨境贷款额度管理和间接授信边界"
    - "训练数据、模型调用、人工干预和责任留痕链路"

preferred_action_examples:
  bank:
    - "梳理跨境授信流程口径"
    - "调整支付工具与贷款产品区隔展示"
    - "评估税务数据接入和授信模型边界"
  insurance:
    - "开展存量产品回溯"
    - "统一条款、销售话术与备案前复核口径"
  securities:
    - "提前切换交易参数"
    - "升级终端展示、订单校验和风控阈值"
    - "做配套规则映射"
  futures:
    - "开展存量业务回归路径和资本充足性差距评估"
  healthcare:
    - "做地方实施细则映射"
    - "评估健康服务合作和支付衔接模式调整"
  group:
    - "由合规、科技、业务统一牵头开展全链条排查"
    - "将相关场景纳入现有治理框架"
    - "补齐境外合规风险识别和应对机制"

forbidden_phrases:
  - "该政策体现了"
  - "该文件反映出"
  - "这意味着"
  - "从长期看"
  - "从宏观层面看"
  - "有助于"
  - "进一步彰显"
  - "要高度重视"
  - "要认真学习领会"
  - "要持续关注"

quality_preferences:
  sentence_style:
    - "句子短"
    - "信息密"
    - "不空泛"
    - "不绕弯"
    - "像最终业务终稿"
  avoid:
    - "行业背景铺陈"
    - "宏观趋势讨论"
    - "政策意义拔高"
    - "单条动作堆叠（同一主体下不要堆叠多个并列动作；多主体多动作应通过分号切分到各自主体下）"
    - "重复表述"
  desired_effect:
    - "高管一眼能看到哪个政策、谁受影响、要做什么"

# ----------------------------------------------------------------------
# editor_notes_rules：编辑注记体系
# 用于承接终稿中【已做专项解读】、【集团反洗钱团队已做专项解读】、
# 【正在组织开展专题解读】、【稍后单独提交专题分析】等结构化注记。
# 这是终稿的标准结构元素，提示高管"集团已知此事被覆盖"。
# 注记内容不来自 LLM 推理，只能来自 fact sheet 的 group_internal_status
# 与 group_internal_status_team 字段（由人工通过 weekly_policies.json 录入）。
# ----------------------------------------------------------------------
editor_notes_rules:
  enabled: true
  allowed_tags:
    - "已做专项解读"
    - "已另行形成专项解读"
    - "已做专题解读"
    - "正在组织开展专题解读"
    - "稍后单独提交专题分析"
    - "已反馈意见"
    - "已组织学习研读并提交反馈意见"
    - "差距分析中"
    - "已开展深入解读及差距分析"
  allowed_subjects:
    - "（不指定主体）"
    - "集团反洗钱团队"
    - "集团消保团队"
    - "集团合规部"
    - "集团科技条线"
    - "集团财务部"
    - "平安产险农险部"
    - "平安银行"
    - "平安信托"
    - "平安资本"
    - "平安租赁"
  rendering_pattern:
    with_subject: "【{subject}{tag}】"
    without_subject: "【{tag}】"
  placement_rules:
    - "默认放在 paragraph2 末尾（与最后一个动作之间用空格分隔，不接句号）"
    - "若 paragraph2_mode = none（仅一段），则放在 paragraph1 末尾"
    - "也允许作为 paragraph2 的独立短句出现（如：'平安产险农险部已组织学习研读并提交反馈意见。'，此时不用方括号包裹）"
    - "一条政策最多出现 1 个编辑注记"
  trigger_source:
    - "fact_sheet.group_internal_status（必填，枚举：'无' / '已做专项解读' / '专项解读进行中' / 等）"
    - "fact_sheet.group_internal_status_team（可选，枚举见 allowed_subjects）"
    - "原始来源：weekly_policies.json 输入端的 group_internal_status 字段（人工录入）"
  forbidden:
    - "LLM 不得自行推理出编辑注记。group_internal_status='无' 时禁止生成"
    - "禁止使用 allowed_tags 之外的注记内容"
    - "禁止使用 allowed_subjects 之外的主体"

